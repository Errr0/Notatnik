<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notatnik</title>
<style>
  :root{
    --bg:#14171c;
    --panel:#1b1f26;
    --panel-2:#20252d;
    --line:#2c323c;
    --text:#e6e8eb;
    --text-dim:#8a919d;
    --accent:#d8a657;
    --accent-dim:#6f5c39;
    --blue:#6c7a93;
    --danger:#c1594f;
    --good:#5f9e6f;
    --radius:3px;
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", "Consolas", monospace;
    --sans: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
  }
  button{
    font-family:inherit;
    cursor:pointer;
    background:var(--panel-2);
    color:var(--text);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:6px 12px;
    font-size:13px;
  }
  button:hover{border-color:var(--accent-dim);}
  button.primary{background:var(--accent);color:#1a1400;border-color:var(--accent);font-weight:600;}
  button.primary:hover{filter:brightness(1.08);}
  button.ghost{background:transparent;border-color:transparent;color:var(--text-dim);}
  button.ghost:hover{color:var(--text);border-color:var(--line);}
  button.danger{color:var(--danger);}
  input,textarea,select{
    font-family:inherit;
    background:var(--panel-2);
    color:var(--text);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:6px 8px;
    font-size:13px;
  }
  input:focus,textarea:focus,select:focus,button:focus-visible{
    outline:2px solid var(--accent-dim);
    outline-offset:1px;
  }
  ::placeholder{color:var(--text-dim);}

  /* ---------- LOGIN ---------- */
  #login-screen{
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:16px;
  }
  .login-card{
    width:min(320px, 90vw);
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:28px;
  }
  .login-card h1{
    font-size:15px;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:var(--text-dim);
    margin:0 0 18px;
    font-weight:600;
  }
  .login-card input{width:100%;margin-bottom:10px;}
  .login-card button{width:100%;}
  .login-hint{font-size:12px;color:var(--text-dim);max-width:320px;text-align:center;line-height:1.5;}
  .login-error{color:var(--danger);font-size:12px;min-height:16px;}

  /* ---------- APP SHELL ---------- */
  #app{display:none;height:100%;flex-direction:column;}
  #app.visible{display:flex;}

  .tabbar{
    display:flex;
    align-items:flex-end;
    gap:2px;
    padding:10px 14px 0;
    background:var(--panel);
    border-bottom:1px solid var(--line);
    overflow-x:auto;
  }
  .tab{
    padding:8px 14px;
    font-size:13px;
    color:var(--text-dim);
    background:var(--bg);
    border:1px solid var(--line);
    border-bottom:none;
    border-radius:var(--radius) var(--radius) 0 0;
    cursor:pointer;
    white-space:nowrap;
    position:relative;
    top:1px;
  }
  .tab.active{
    color:var(--text);
    background:var(--bg);
    border-color:var(--line);
    border-bottom:1px solid var(--bg);
    font-weight:600;
  }
  .tab .tab-x{
    margin-left:8px;
    color:var(--text-dim);
    font-size:11px;
  }
  .tab .tab-x:hover{color:var(--danger);}
  .tab-add{
    padding:8px 12px;
    font-size:15px;
    color:var(--text-dim);
    cursor:pointer;
    border:1px solid transparent;
  }
  .tab-add:hover{color:var(--accent);}

  .toolbar{
    display:flex;
    align-items:center;
    gap:8px;
    padding:12px 14px;
    background:var(--bg);
    border-bottom:1px solid var(--line);
    flex-wrap:wrap;
  }
  .toolbar input[type=search]{flex:1;min-width:160px;}
  .toolbar .spacer{flex:1;}
  .toolbar select{max-width:160px;}

  main{flex:1;overflow-y:auto;padding:18px 14px 60px;}
  .content-inner{max-width:840px;margin:0 auto;}

  .group-block{margin-bottom:26px;}
  .group-title{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:var(--text-dim);
    margin:0 0 10px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .group-title .line{flex:1;height:1px;background:var(--line);}
  .group-title .g-actions{display:none;gap:4px;}
  .group-block:hover .g-actions{display:flex;}

  .empty-state{
    text-align:center;
    color:var(--text-dim);
    padding:60px 20px;
    font-size:13px;
    line-height:1.6;
  }

  /* generic note record */
  .note-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px 16px;
    margin-bottom:10px;
    cursor:pointer;
  }
  .note-card:hover{border-color:var(--accent-dim);}
  .note-card h3{margin:0 0 6px;font-size:14px;}
  .note-card p{margin:0;color:var(--text-dim);font-size:12.5px;white-space:pre-wrap;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .note-meta{font-size:11px;color:var(--text-dim);margin-top:8px;font-family:var(--mono);}

  /* training tree-table */
  .train-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    margin-bottom:14px;
    overflow:hidden;
    cursor:pointer;
  }
  .train-card:hover{border-color:var(--accent-dim);}
  .train-date{
    background:var(--panel-2);
    padding:10px 14px;
    font-family:var(--mono);
    font-size:13px;
    font-weight:600;
    letter-spacing:.02em;
    border-bottom:1px solid var(--line);
    text-transform:capitalize;
  }
  .train-table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12.5px;}
  .train-table td{border:1px solid var(--line);padding:7px 10px;vertical-align:top;}
  .ex-name-row td{background:rgba(216,166,87,0.06);color:var(--accent);font-weight:600;}
  .ex-sets-row td{color:var(--text-dim);}
  .set-chip{
    display:inline-block;
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:2px 7px;
    margin:1px 3px 1px 0;
    color:var(--text);
  }

  /* monster tasting card */
  .taste-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px 16px;
    margin-bottom:10px;
    cursor:pointer;
  }
  .taste-card:hover{border-color:var(--accent-dim);}
  .taste-top{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .taste-name{font-size:14px;font-weight:600;}
  .taste-score{
    font-family:var(--mono);
    font-size:13px;
    font-weight:700;
    padding:3px 9px;
    border-radius:var(--radius);
    color:#14171c;
    min-width:28px;
    text-align:center;
  }
  .taste-bar{height:5px;border-radius:3px;margin-top:10px;background:var(--panel-2);overflow:hidden;}
  .taste-bar-fill{height:100%;}
  .taste-note{margin-top:8px;font-size:12.5px;color:var(--text-dim);white-space:pre-wrap;}

  /* modal */
  .overlay{
    display:none;
    position:fixed;inset:0;
    background:rgba(10,12,15,.6);
    align-items:flex-start;
    justify-content:center;
    padding:5vh 16px;
    overflow-y:auto;
    z-index:50;
  }
  .overlay.visible{display:flex;}
  .modal{
    width:min(560px,100%);
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:22px;
  }
  .modal h2{margin:0 0 16px;font-size:15px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-dim);margin-bottom:5px;}
  .field input,.field textarea,.field select{width:100%;}
  .field textarea{min-height:100px;resize:vertical;}
  .modal-actions{display:flex;justify-content:space-between;gap:8px;margin-top:20px;}
  .modal-actions .left{display:flex;gap:8px;}
  .modal-actions .right{display:flex;gap:8px;}

  .ex-block{border:1px solid var(--line);border-radius:var(--radius);padding:10px;margin-bottom:8px;background:var(--panel-2);}
  .ex-block-top{display:flex;gap:8px;margin-bottom:8px;}
  .ex-block-top input{flex:1;}
  .sets-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
  .set-input{width:56px;}
  .row-btns{display:flex;gap:6px;margin-top:10px;}

  .slider-wrap{display:flex;align-items:center;gap:12px;}
  .slider-wrap input[type=range]{flex:1;}
  .slider-val{
    font-family:var(--mono);
    font-weight:700;
    min-width:30px;
    text-align:center;
    padding:3px 6px;
    border-radius:var(--radius);
    color:#14171c;
  }

  .topbar-right{display:flex;gap:8px;align-items:center;}
  .app-title{font-size:12px;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase;margin-right:auto;padding:8px 4px;font-weight:600;}

  #file-input{display:none;}
  .sync-status{font-size:11px;color:var(--text-dim);font-family:var(--mono);white-space:nowrap;}
  .sync-status.ok{color:var(--good);}
  .sync-status.err{color:var(--danger);}

  @media (max-width:520px){
    .toolbar{flex-direction:column;align-items:stretch;}
    .toolbar select{max-width:none;}
  }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h1 id="login-title">Logowanie</h1>
    <input type="password" id="login-pass" placeholder="Hasło" autocomplete="current-password">
    <div class="login-error" id="login-error"></div>
    <button class="primary" id="login-btn">Wejdź</button>
  </div>
  <div class="login-hint" id="login-hint"></div>
</div>

<div id="app">
  <div class="tabbar" id="tabbar"></div>
  <div class="toolbar">
    <input type="search" id="search" placeholder="Szukaj...">
    <select id="group-filter"></select>
    <div class="spacer"></div>
    <button id="add-record-btn" class="primary">+ Rekord</button>
    <button id="manage-groups-btn">Grupy</button>
    <button id="export-btn">Eksport</button>
    <button id="import-btn">Import</button>
    <button id="sync-btn">Synchronizacja</button>
    <span id="sync-status" class="sync-status"></span>
    <button id="lock-btn" class="ghost">Zablokuj</button>
    <input type="file" id="file-input" accept="application/json">
  </div>
  <main><div class="content-inner" id="content"></div></main>
</div>

<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>

<script>
(function(){
"use strict";

/* ===================== storage / state ===================== */
const STORAGE_KEY = "notatnik_state_v1";
const SESSION_KEY = "notatnik_unlocked";

function hashStr(s){
  // simple non-cryptographic hash, sufficient for a casual client-side gate
  let h = 5381;
  for(let i=0;i<s.length;i++){ h = ((h*33) ^ s.charCodeAt(i)) >>> 0; }
  return h.toString(16);
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }

function defaultState(){
  return {
    auth: { hash: null },
    activeTabId: null,
    tabs: [
      { id: uid(), name: "Treningi", type: "training", groups: [], records: [] },
      { id: uid(), name: "Monster",  type: "monster",  groups: [], records: [] }
    ]
  };
}

let state = load();
if(!state.activeTabId && state.tabs.length) state.activeTabId = state.tabs[0].id;

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    if(!parsed.tabs || !parsed.tabs.length) return defaultState();
    return parsed;
  }catch(e){ return defaultState(); }
}

let saveTimer = null;
function save(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    scheduleSyncPush();
  }, 150);
}

/* ===================== gist sync ===================== */
const SYNC_KEY = "notatnik_sync_v1";
const GIST_FILENAME = "notatnik-dane.json";

function loadSync(){
  try{ return JSON.parse(localStorage.getItem(SYNC_KEY)) || {token:"", gistId:""}; }
  catch(e){ return {token:"", gistId:""}; }
}
function saveSyncCfg(cfg){ localStorage.setItem(SYNC_KEY, JSON.stringify(cfg)); }
let syncCfg = loadSync();

function setSyncStatus(text, cls){
  const el = document.getElementById("sync-status");
  if(!el) return;
  el.textContent = text;
  el.className = "sync-status" + (cls ? " "+cls : "");
}

function syncConfigured(){ return !!(syncCfg.token && syncCfg.gistId); }

let syncPushTimer = null;
function scheduleSyncPush(){
  if(!syncConfigured()) return;
  clearTimeout(syncPushTimer);
  syncPushTimer = setTimeout(syncPush, 1200);
}

async function syncPush(){
  if(!syncConfigured()) return;
  setSyncStatus("Zapisywanie...", "");
  try{
    const res = await fetch(`https://api.github.com/gists/${syncCfg.gistId}`, {
      method: "PATCH",
      headers: {
        "Authorization": `token ${syncCfg.token}`,
        "Accept": "application/vnd.github+json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ files: { [GIST_FILENAME]: { content: JSON.stringify(state, null, 2) } } })
    });
    if(!res.ok) throw new Error("HTTP " + res.status);
    setSyncStatus("Zsynchronizowano " + new Date().toLocaleTimeString("pl-PL"), "ok");
  }catch(e){
    setSyncStatus("Błąd synchronizacji", "err");
  }
}

async function syncPull(){
  if(!syncConfigured()) return false;
  setSyncStatus("Pobieranie...", "");
  try{
    const res = await fetch(`https://api.github.com/gists/${syncCfg.gistId}`, {
      headers: { "Authorization": `token ${syncCfg.token}`, "Accept": "application/vnd.github+json" }
    });
    if(!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const file = data.files && data.files[GIST_FILENAME];
    if(file && file.content){
      const remote = JSON.parse(file.content);
      if(remote && remote.tabs){
        state = remote;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }
    }
    setSyncStatus("Zsynchronizowano " + new Date().toLocaleTimeString("pl-PL"), "ok");
    return true;
  }catch(e){
    setSyncStatus("Błąd pobierania", "err");
    return false;
  }
}

async function syncCreateGist(){
  setSyncStatus("Tworzenie Gista...", "");
  try{
    const res = await fetch(`https://api.github.com/gists`, {
      method: "POST",
      headers: {
        "Authorization": `token ${syncCfg.token}`,
        "Accept": "application/vnd.github+json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        description: "Notatnik — dane aplikacji",
        public: false,
        files: { [GIST_FILENAME]: { content: JSON.stringify(state, null, 2) } }
      })
    });
    if(!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    syncCfg.gistId = data.id;
    saveSyncCfg(syncCfg);
    setSyncStatus("Utworzono i zsynchronizowano", "ok");
    return data.id;
  }catch(e){
    setSyncStatus("Błąd tworzenia Gista", "err");
    return null;
  }
}

/* ===================== login ===================== */
const loginScreen = document.getElementById("login-screen");
const loginTitle = document.getElementById("login-title");
const loginPass = document.getElementById("login-pass");
const loginBtn = document.getElementById("login-btn");
const loginError = document.getElementById("login-error");
const loginHint = document.getElementById("login-hint");
const appEl = document.getElementById("app");

function isFirstRun(){ return !state.auth || !state.auth.hash; }

function renderLogin(){
  if(isFirstRun()){
    loginTitle.textContent = "Ustaw hasło";
    loginHint.textContent = "To proste, lokalne zabezpieczenie zapisane w przeglądarce — nie chroni danych jeśli ktoś ma dostęp do tego urządzenia. Możesz zostawić puste i kliknąć Wejdź, by pominąć logowanie.";
  } else {
    loginTitle.textContent = "Logowanie";
    loginHint.textContent = "";
  }
  loginError.textContent = "";
  loginPass.value = "";
}

function tryUnlock(){
  const val = loginPass.value;
  if(isFirstRun()){
    if(val.trim() !== ""){
      state.auth.hash = hashStr(val);
      save();
    }
    unlock();
    return;
  }
  if(hashStr(val) === state.auth.hash){
    unlock();
  } else {
    loginError.textContent = "Błędne hasło.";
    loginPass.value = "";
    loginPass.focus();
  }
}

async function unlock(){
  sessionStorage.setItem(SESSION_KEY, "1");
  loginScreen.style.display = "none";
  appEl.classList.add("visible");
  renderAll();
  if(syncConfigured()){
    const ok = await syncPull();
    if(ok) renderAll();
  }
}

function lock(){
  sessionStorage.removeItem(SESSION_KEY);
  appEl.classList.remove("visible");
  loginScreen.style.display = "flex";
  renderLogin();
  loginPass.focus();
}

loginBtn.addEventListener("click", tryUnlock);
loginPass.addEventListener("keydown", e=>{ if(e.key === "Enter") tryUnlock(); });
document.getElementById("lock-btn").addEventListener("click", lock);

/* ===================== helpers ===================== */
function activeTab(){ return state.tabs.find(t=>t.id === state.activeTabId) || state.tabs[0]; }
function fmtDate(iso){
  if(!iso) return "";
  const d = new Date(iso+"T00:00:00");
  if(isNaN(d)) return iso;
  const day = d.toLocaleDateString("pl-PL", {weekday:"long"});
  const dd = String(d.getDate()).padStart(2,"0");
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const yyyy = d.getFullYear();
  return `${day.charAt(0).toUpperCase()+day.slice(1)} ${dd}.${mm}.${yyyy}`;
}
function ratingColor(v){
  // 1 (red) -> 10 (green)
  const t = Math.max(0, Math.min(1, (v-1)/9));
  const hue = 4 + t*116; // 4=red .. 120=green
  return `hsl(${hue}, 62%, 48%)`;
}

/* ===================== tab bar ===================== */
const tabbar = document.getElementById("tabbar");

function renderTabs(){
  tabbar.innerHTML = "";
  state.tabs.forEach(t=>{
    const el = document.createElement("div");
    el.className = "tab" + (t.id===state.activeTabId ? " active" : "");
    el.textContent = t.name;
    el.title = "Kliknij aby przejść • dwuklik aby zmienić nazwę";
    el.addEventListener("click", ()=>{ state.activeTabId = t.id; save(); renderAll(); });
    el.addEventListener("dblclick", (e)=>{
      e.stopPropagation();
      const name = prompt("Nazwa zakładki:", t.name);
      if(name && name.trim()){ t.name = name.trim(); save(); renderAll(); }
    });
    if(state.tabs.length > 1){
      const x = document.createElement("span");
      x.className = "tab-x";
      x.textContent = "✕";
      x.addEventListener("click", (e)=>{
        e.stopPropagation();
        if(confirm(`Usunąć zakładkę "${t.name}" wraz z jej rekordami?`)){
          state.tabs = state.tabs.filter(tt=>tt.id!==t.id);
          if(state.activeTabId === t.id) state.activeTabId = state.tabs[0].id;
          save(); renderAll();
        }
      });
      el.appendChild(x);
    }
    tabbar.appendChild(el);
  });
  const add = document.createElement("div");
  add.className = "tab-add";
  add.textContent = "+";
  add.title = "Nowa zakładka";
  add.addEventListener("click", ()=>{
    const name = prompt("Nazwa nowej zakładki:", "Nowa zakładka");
    if(name && name.trim()){
      const t = { id: uid(), name: name.trim(), type: "generic", groups: [], records: [] };
      state.tabs.push(t);
      state.activeTabId = t.id;
      save(); renderAll();
    }
  });
  tabbar.appendChild(add);
}

/* ===================== toolbar: search / filter ===================== */
const searchInput = document.getElementById("search");
const groupFilter = document.getElementById("group-filter");
let searchQuery = "";
let filterGroupId = "";

searchInput.addEventListener("input", ()=>{ searchQuery = searchInput.value.trim().toLowerCase(); renderContent(); });
groupFilter.addEventListener("change", ()=>{ filterGroupId = groupFilter.value; renderContent(); });

function renderGroupFilter(){
  const tab = activeTab();
  groupFilter.innerHTML = "";
  const optAll = document.createElement("option");
  optAll.value = ""; optAll.textContent = "Wszystkie grupy";
  groupFilter.appendChild(optAll);
  tab.groups.forEach(g=>{
    const o = document.createElement("option");
    o.value = g.id; o.textContent = g.name;
    groupFilter.appendChild(o);
  });
  const optNone = document.createElement("option");
  optNone.value = "__none__"; optNone.textContent = "Bez grupy";
  groupFilter.appendChild(optNone);
  groupFilter.value = filterGroupId;
}

/* ===================== record matching / search ===================== */
function recordText(tab, rec){
  if(tab.type === "training"){
    let s = fmtDate(rec.date) + " ";
    (rec.exercises||[]).forEach(ex=>{ s += ex.name + " " + (ex.sets||[]).join(" ") + " "; });
    return s.toLowerCase();
  }
  if(tab.type === "monster"){
    return ((rec.partyName||"") + " " + (rec.note||"")).toLowerCase();
  }
  return ((rec.title||"") + " " + (rec.content||"")).toLowerCase();
}

function matches(tab, rec){
  if(filterGroupId){
    if(filterGroupId === "__none__" ? rec.groupId : rec.groupId !== filterGroupId) return false;
  }
  if(searchQuery && !recordText(tab, rec).includes(searchQuery)) return false;
  return true;
}

/* ===================== content rendering ===================== */
const content = document.getElementById("content");

function renderContent(){
  const tab = activeTab();
  content.innerHTML = "";
  if(!tab){ return; }

  const filtered = tab.records.filter(r=>matches(tab,r));
  if(filtered.length === 0){
    const empty = document.createElement("div");
    empty.className = "empty-state";
    empty.textContent = tab.records.length === 0
      ? "Brak rekordów. Dodaj pierwszy przyciskiem „+ Rekord”."
      : "Nic nie pasuje do wyszukiwania / filtra.";
    content.appendChild(empty);
    return;
  }

  // group records: known groups in order, then ungrouped
  const groupsOrder = [...tab.groups, {id:"__none__", name:"Bez grupy"}];
  groupsOrder.forEach(g=>{
    const groupId = g.id === "__none__" ? null : g.id;
    const recs = filtered.filter(r => (r.groupId||null) === groupId)
                          .sort((a,b)=> (b.updatedAt||0) - (a.updatedAt||0));
    if(recs.length === 0) return;

    const block = document.createElement("div");
    block.className = "group-block";
    const title = document.createElement("div");
    title.className = "group-title";
    title.innerHTML = `<span>${g.name}</span><span class="line"></span>`;
    block.appendChild(title);

    recs.forEach(rec=>{
      block.appendChild(renderRecordCard(tab, rec));
    });
    content.appendChild(block);
  });
}

function renderRecordCard(tab, rec){
  if(tab.type === "training") return renderTrainingCard(tab, rec);
  if(tab.type === "monster") return renderMonsterCard(tab, rec);
  return renderGenericCard(tab, rec);
}

function renderGenericCard(tab, rec){
  const el = document.createElement("div");
  el.className = "note-card";
  el.innerHTML = `
    <h3>${escapeHtml(rec.title||"(bez tytułu)")}</h3>
    <p>${escapeHtml(rec.content||"")}</p>
    <div class="note-meta">${rec.updatedAt ? new Date(rec.updatedAt).toLocaleString("pl-PL") : ""}</div>
  `;
  el.addEventListener("click", ()=>openGenericModal(tab, rec));
  return el;
}

function renderTrainingCard(tab, rec){
  const el = document.createElement("div");
  el.className = "train-card";
  let table = `<table class="train-table"><tbody>`;
  (rec.exercises||[]).forEach(ex=>{
    table += `<tr class="ex-name-row"><td>${escapeHtml(ex.name||"(ćwiczenie)")}</td></tr>`;
    const sets = (ex.sets||[]).map(v=>`<span class="set-chip">${escapeHtml(String(v))}</span>`).join("");
    table += `<tr class="ex-sets-row"><td>${sets || '<span class="set-chip">—</span>'}</td></tr>`;
  });
  table += `</tbody></table>`;
  el.innerHTML = `<div class="train-date">${fmtDate(rec.date) || "(brak daty)"}</div>${table}`;
  el.addEventListener("click", ()=>openTrainingModal(tab, rec));
  return el;
}

function renderMonsterCard(tab, rec){
  const el = document.createElement("div");
  el.className = "taste-card";
  const rating = rec.rating || 5;
  const color = ratingColor(rating);
  el.innerHTML = `
    <div class="taste-top">
      <div class="taste-name">${escapeHtml(rec.partyName||"(bez nazwy)")}</div>
      <div class="taste-score" style="background:${color}">${rating}</div>
    </div>
    <div class="taste-bar"><div class="taste-bar-fill" style="width:${rating*10}%;background:${color}"></div></div>
    ${rec.note ? `<div class="taste-note">${escapeHtml(rec.note)}</div>` : ""}
  `;
  el.addEventListener("click", ()=>openMonsterModal(tab, rec));
  return el;
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

/* ===================== modal engine ===================== */
const overlay = document.getElementById("overlay");
const modal = document.getElementById("modal");

function closeModal(){ overlay.classList.remove("visible"); modal.innerHTML=""; }
overlay.addEventListener("click", (e)=>{ if(e.target === overlay) closeModal(); });
document.addEventListener("keydown", (e)=>{ if(e.key === "Escape") closeModal(); });

function openModal(html){ modal.innerHTML = html; overlay.classList.add("visible"); }

function groupOptionsHtml(tab, selectedId){
  let opts = `<option value="">Bez grupy</option>`;
  tab.groups.forEach(g=>{
    opts += `<option value="${g.id}" ${g.id===selectedId?"selected":""}>${escapeHtml(g.name)}</option>`;
  });
  return opts;
}

/* ---- generic note modal ---- */
function openGenericModal(tab, rec){
  const isNew = !rec;
  const r = rec || { id: uid(), groupId: null, title:"", content:"" };
  openModal(`
    <h2>${isNew ? "Nowy rekord" : "Edytuj rekord"}</h2>
    <div class="field"><label>Tytuł</label><input id="f-title" value="${escapeHtml(r.title||"")}"></div>
    <div class="field"><label>Treść</label><textarea id="f-content">${escapeHtml(r.content||"")}</textarea></div>
    <div class="field"><label>Grupa</label><select id="f-group">${groupOptionsHtml(tab, r.groupId)}</select></div>
    <div class="modal-actions">
      <div class="left">${isNew?"":'<button class="danger" id="f-del">Usuń</button>'}</div>
      <div class="right"><button id="f-cancel">Anuluj</button><button class="primary" id="f-save">Zapisz</button></div>
    </div>
  `);
  document.getElementById("f-cancel").onclick = closeModal;
  document.getElementById("f-save").onclick = ()=>{
    r.title = document.getElementById("f-title").value.trim();
    r.content = document.getElementById("f-content").value;
    r.groupId = document.getElementById("f-group").value || null;
    r.updatedAt = Date.now();
    if(isNew) tab.records.push(r);
    save(); closeModal(); renderAll();
  };
  const del = document.getElementById("f-del");
  if(del) del.onclick = ()=>{
    if(confirm("Usunąć ten rekord?")){
      tab.records = tab.records.filter(x=>x.id!==r.id);
      save(); closeModal(); renderAll();
    }
  };
}

/* ---- training modal ---- */
function openTrainingModal(tab, rec){
  const isNew = !rec;
  const r = rec ? JSON.parse(JSON.stringify(rec)) : { id: uid(), groupId:null, date: new Date().toISOString().slice(0,10), exercises: [{name:"", sets:[]}] };

  function exercisesHtml(){
    return r.exercises.map((ex, i)=>`
      <div class="ex-block" data-idx="${i}">
        <div class="ex-block-top">
          <input class="ex-name" placeholder="Nazwa ćwiczenia" value="${escapeHtml(ex.name||"")}">
          <button class="ghost ex-remove" ${r.exercises.length<=1?"disabled":""}>Usuń</button>
        </div>
        <div class="sets-row">
          ${ex.sets.map((v,si)=>`<input type="number" class="set-input" data-si="${si}" value="${v}">`).join("")}
          <button class="ghost set-add" ${ex.sets.length>=5?"disabled":""}>+ liczba</button>
          ${ex.sets.length>0?'<button class="ghost set-remove">− liczba</button>':""}
        </div>
      </div>
    `).join("");
  }

  function bodyHtml(){
    return `
      <h2>${isNew ? "Nowy trening" : "Edytuj trening"}</h2>
      <div class="field"><label>Data</label><input type="date" id="f-date" value="${r.date}"></div>
      <div class="field"><label>Grupa</label><select id="f-group">${groupOptionsHtml(tab, r.groupId)}</select></div>
      <div class="field"><label>Ćwiczenia (max 5)</label><div id="ex-container">${exercisesHtml()}</div>
        <div class="row-btns"><button class="ghost" id="ex-add" ${r.exercises.length>=5?"disabled":""}>+ ćwiczenie</button></div>
      </div>
      <div class="modal-actions">
        <div class="left">${isNew?"":'<button class="danger" id="f-del">Usuń</button>'}</div>
        <div class="right"><button id="f-cancel">Anuluj</button><button class="primary" id="f-save">Zapisz</button></div>
      </div>
    `;
  }

  function rerenderModal(){
    // preserve date field value in r before rerender
    const dateEl = document.getElementById("f-date");
    const groupEl = document.getElementById("f-group");
    if(dateEl) r.date = dateEl.value;
    if(groupEl) r.groupId = groupEl.value || null;
    openModal(bodyHtml());
    wire();
  }

  function readExercisesFromDom(){
    document.querySelectorAll("#ex-container .ex-block").forEach(block=>{
      const idx = +block.dataset.idx;
      r.exercises[idx].name = block.querySelector(".ex-name").value;
      const sets = [];
      block.querySelectorAll(".set-input").forEach(inp=> sets.push(inp.value === "" ? 0 : Number(inp.value)));
      r.exercises[idx].sets = sets;
    });
  }

  function wire(){
    document.getElementById("f-cancel").onclick = closeModal;
    document.getElementById("f-del") && (document.getElementById("f-del").onclick = ()=>{
      if(confirm("Usunąć ten trening?")){
        tab.records = tab.records.filter(x=>x.id!==r.id);
        save(); closeModal(); renderAll();
      }
    });
    document.getElementById("ex-add").onclick = ()=>{
      readExercisesFromDom();
      if(r.exercises.length < 5) r.exercises.push({name:"", sets:[]});
      rerenderModal();
    };
    document.querySelectorAll(".ex-remove").forEach(btn=>{
      btn.onclick = ()=>{
        readExercisesFromDom();
        const idx = +btn.closest(".ex-block").dataset.idx;
        r.exercises.splice(idx,1);
        rerenderModal();
      };
    });
    document.querySelectorAll(".set-add").forEach(btn=>{
      btn.onclick = ()=>{
        readExercisesFromDom();
        const idx = +btn.closest(".ex-block").dataset.idx;
        if(r.exercises[idx].sets.length < 5) r.exercises[idx].sets.push(0);
        rerenderModal();
      };
    });
    document.querySelectorAll(".set-remove").forEach(btn=>{
      btn.onclick = ()=>{
        readExercisesFromDom();
        const idx = +btn.closest(".ex-block").dataset.idx;
        r.exercises[idx].sets.pop();
        rerenderModal();
      };
    });
    document.getElementById("f-save").onclick = ()=>{
      readExercisesFromDom();
      r.date = document.getElementById("f-date").value;
      r.groupId = document.getElementById("f-group").value || null;
      r.updatedAt = Date.now();
      if(isNew) tab.records.push(r);
      else Object.assign(rec, r);
      save(); closeModal(); renderAll();
    };
  }

  openModal(bodyHtml());
  wire();
}

/* ---- monster modal ---- */
function openMonsterModal(tab, rec){
  const isNew = !rec;
  const r = rec || { id: uid(), groupId:null, partyName:"", rating:5, note:"" };
  openModal(`
    <h2>${isNew ? "Nowa partia" : "Edytuj partię"}</h2>
    <div class="field"><label>Nazwa partii</label><input id="f-name" value="${escapeHtml(r.partyName||"")}"></div>
    <div class="field"><label>Ocena smaku</label>
      <div class="slider-wrap">
        <input type="range" min="1" max="10" step="1" id="f-rating" value="${r.rating||5}">
        <div class="slider-val" id="f-rating-val" style="background:${ratingColor(r.rating||5)}">${r.rating||5}</div>
      </div>
    </div>
    <div class="field"><label>Notatka (opcjonalnie)</label><textarea id="f-note">${escapeHtml(r.note||"")}</textarea></div>
    <div class="field"><label>Grupa</label><select id="f-group">${groupOptionsHtml(tab, r.groupId)}</select></div>
    <div class="modal-actions">
      <div class="left">${isNew?"":'<button class="danger" id="f-del">Usuń</button>'}</div>
      <div class="right"><button id="f-cancel">Anuluj</button><button class="primary" id="f-save">Zapisz</button></div>
    </div>
  `);
  const slider = document.getElementById("f-rating");
  const valBox = document.getElementById("f-rating-val");
  slider.addEventListener("input", ()=>{
    valBox.textContent = slider.value;
    valBox.style.background = ratingColor(Number(slider.value));
  });
  document.getElementById("f-cancel").onclick = closeModal;
  document.getElementById("f-save").onclick = ()=>{
    r.partyName = document.getElementById("f-name").value.trim();
    r.rating = Number(slider.value);
    r.note = document.getElementById("f-note").value;
    r.groupId = document.getElementById("f-group").value || null;
    r.updatedAt = Date.now();
    if(isNew) tab.records.push(r);
    save(); closeModal(); renderAll();
  };
  const del = document.getElementById("f-del");
  if(del) del.onclick = ()=>{
    if(confirm("Usunąć tę partię?")){
      tab.records = tab.records.filter(x=>x.id!==r.id);
      save(); closeModal(); renderAll();
    }
  };
}

/* ---- groups management modal ---- */
function openGroupsModal(){
  const tab = activeTab();
  function bodyHtml(){
    return `
      <h2>Grupy — ${escapeHtml(tab.name)}</h2>
      <div id="groups-list">
        ${tab.groups.map(g=>`
          <div class="field" style="display:flex;gap:8px;align-items:center;" data-gid="${g.id}">
            <input class="g-name" value="${escapeHtml(g.name)}" style="flex:1;">
            <button class="ghost g-del">Usuń</button>
          </div>
        `).join("") || '<div class="login-hint" style="text-align:left;padding:0 0 10px;">Brak grup.</div>'}
      </div>
      <div class="row-btns"><button class="ghost" id="g-add">+ Grupa</button></div>
      <div class="modal-actions"><div class="left"></div><div class="right"><button class="primary" id="g-close">Zamknij</button></div></div>
    `;
  }
  function wire(){
    document.getElementById("g-close").onclick = ()=>{ save(); closeModal(); renderAll(); };
    document.getElementById("g-add").onclick = ()=>{
      tab.groups.push({id:uid(), name:"Nowa grupa"});
      openModal(bodyHtml()); wire();
    };
    document.querySelectorAll(".g-name").forEach(inp=>{
      inp.onchange = ()=>{
        const gid = inp.closest("[data-gid]").dataset.gid;
        const g = tab.groups.find(x=>x.id===gid);
        if(g) g.name = inp.value.trim() || g.name;
      };
    });
    document.querySelectorAll(".g-del").forEach(btn=>{
      btn.onclick = ()=>{
        const gid = btn.closest("[data-gid]").dataset.gid;
        if(confirm("Usunąć grupę? Rekordy w niej zostaną bez grupy.")){
          tab.groups = tab.groups.filter(x=>x.id!==gid);
          tab.records.forEach(r=>{ if(r.groupId===gid) r.groupId=null; });
          openModal(bodyHtml()); wire();
        }
      };
    });
  }
  openModal(bodyHtml());
  wire();
}

/* ===================== toolbar buttons ===================== */
document.getElementById("add-record-btn").addEventListener("click", ()=>{
  const tab = activeTab();
  if(tab.type === "training") openTrainingModal(tab, null);
  else if(tab.type === "monster") openMonsterModal(tab, null);
  else openGenericModal(tab, null);
});
document.getElementById("manage-groups-btn").addEventListener("click", openGroupsModal);
document.getElementById("sync-btn").addEventListener("click", openSyncModal);

function openSyncModal(){
  const connected = syncConfigured();
  openModal(`
    <h2>Synchronizacja (GitHub Gist)</h2>
    <div class="login-hint" style="text-align:left;padding:0 0 14px;">
      Dane są zapisywane w Twoim prywatnym Gist na GitHubie i pobierane na każdym urządzeniu, na którym wpiszesz ten sam token. Token trzymany jest tylko lokalnie w tej przeglądarce, nie jest częścią eksportu.
    </div>
    <div class="field"><label>Token dostępu GitHub (scope: gist)</label>
      <input id="s-token" type="password" placeholder="ghp_..." value="${escapeHtml(syncCfg.token||"")}"></div>
    <div class="field"><label>ID Gista (zostaw puste, aby utworzyć nowy)</label>
      <input id="s-gist" placeholder="np. 8f3a1c2b9e..." value="${escapeHtml(syncCfg.gistId||"")}"></div>
    <div class="modal-actions">
      <div class="left">${connected ? '<button class="danger" id="s-disconnect">Rozłącz</button>' : ""}</div>
      <div class="right">
        <button id="s-cancel">Zamknij</button>
        ${connected ? '<button id="s-pull">Pobierz z Gista</button>' : ""}
        <button class="primary" id="s-save">Zapisz i synchronizuj</button>
      </div>
    </div>
  `);
  document.getElementById("s-cancel").onclick = closeModal;
  const disc = document.getElementById("s-disconnect");
  if(disc) disc.onclick = ()=>{
    syncCfg = {token:"", gistId:""};
    saveSyncCfg(syncCfg);
    setSyncStatus("");
    closeModal();
  };
  const pull = document.getElementById("s-pull");
  if(pull) pull.onclick = async ()=>{
    const ok = await syncPull();
    if(ok){ closeModal(); renderAll(); }
  };
  document.getElementById("s-save").onclick = async ()=>{
    const token = document.getElementById("s-token").value.trim();
    let gistId = document.getElementById("s-gist").value.trim();
    if(!token){ alert("Podaj token."); return; }
    syncCfg = { token, gistId };
    saveSyncCfg(syncCfg);
    if(!gistId){
      gistId = await syncCreateGist();
      if(!gistId){ return; }
    } else {
      const ok = await syncPull();
      if(!ok) return;
    }
    closeModal();
    renderAll();
  };
}

document.getElementById("export-btn").addEventListener("click", ()=>{
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `notatnik-eksport-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
});

const fileInput = document.getElementById("file-input");
document.getElementById("import-btn").addEventListener("click", ()=> fileInput.click());
fileInput.addEventListener("change", ()=>{
  const file = fileInput.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const imported = JSON.parse(reader.result);
      if(!imported.tabs) throw new Error("Nieprawidłowy plik.");
      const mode = confirm("OK = zastąp wszystkie dane importem.\nAnuluj = dołącz zakładki z importu do obecnych danych.");
      if(mode){
        state = imported;
        if(!state.auth) state.auth = {hash:null};
      } else {
        imported.tabs.forEach(t=>{ t.id = uid(); t.records.forEach(r=>r.id=uid()); t.groups.forEach(g=>g.id=uid()); });
        state.tabs.push(...imported.tabs);
      }
      state.activeTabId = state.tabs[0].id;
      save();
      renderAll();
      alert("Import zakończony.");
    }catch(e){
      alert("Nie udało się zaimportować pliku: " + e.message);
    }
    fileInput.value = "";
  };
  reader.readAsText(file);
});

/* ===================== render all ===================== */
function renderAll(){
  if(!state.activeTabId || !state.tabs.find(t=>t.id===state.activeTabId)){
    state.activeTabId = state.tabs[0].id;
  }
  filterGroupId = "";
  renderTabs();
  renderGroupFilter();
  renderContent();
}

/* ===================== boot ===================== */
if(sessionStorage.getItem(SESSION_KEY) === "1" && !isFirstRun()){
  unlock();
} else {
  renderLogin();
  loginPass.focus();
}

})();
</script>
